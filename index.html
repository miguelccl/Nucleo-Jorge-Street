<!DOCTYPE html>
<html lang="pt-BR" class="light">
<head>

    <!-- Tailwind CSS -->

    <script>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>

<body class="bg-gray-50 text-gray-800 dark:bg-darkbg dark:text-gray-100 h-screen overflow-hidden flex">

    <!-- Toast de Notificação -->
    <div id="toast" class="fixed top-4 right-4 px-4 py-3 rounded-xl shadow-lg transform transition-all duration-300 translate-x-full opacity-0 z-50 flex items-center gap-2 text-white bg-gray-800 dark:bg-gray-700">
        <i id="toast-icon" class="ph-fill ph-info text-xl"></i>
        <span id="toast-msg" class="font-medium">Mensagem</span>
    </div>

    <!-- Modal de Participante -->
    <div id="modal-participante" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-darkcard w-full max-w-md rounded-2xl shadow-xl transform scale-95 transition-transform duration-300 p-6 relative">
            <button onclick="closeModal('modal-participante')" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
                <i class="ph ph-x text-xl"></i>
            </button>
            <h2 id="modal-title" class="text-xl font-bold mb-4 text-gray-800 dark:text-gray-100">Novo Participante</h2>
            <input type="hidden" id="part-id">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Nome Completo</label>
                    <input type="text" id="part-nome" placeholder="Ex: Maria Joaquina" class="w-full p-3 rounded-xl bg-gray-50 dark:bg-[#2a2a2a] border border-gray-200 dark:border-darkborder focus:outline-none focus:ring-2 focus:ring-primary/50 text-gray-800 dark:text-gray-100">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Função</label>
                    <input type="text" id="part-funcao" placeholder="Ex: Visitante, Membro, Líder..." class="w-full p-3 rounded-xl bg-gray-50 dark:bg-[#2a2a2a] border border-gray-200 dark:border-darkborder focus:outline-none focus:ring-2 focus:ring-primary/50 text-gray-800 dark:text-gray-100">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Vezes no Núcleo</label>
                    <input type="number" id="part-presencas" min="0" placeholder="Ex: 1" class="w-full p-3 rounded-xl bg-gray-50 dark:bg-[#2a2a2a] border border-gray-200 dark:border-darkborder focus:outline-none focus:ring-2 focus:ring-primary/50 text-gray-800 dark:text-gray-100">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Turma</label>
                    <select id="part-turma" class="w-full p-3 rounded-xl bg-gray-50 dark:bg-[#2a2a2a] border border-gray-200 dark:border-darkborder focus:outline-none focus:ring-2 focus:ring-primary/50 text-gray-800 dark:text-gray-100">
                        <!-- Preenchido via JS -->
                    </select>
                </div>
                <div class="pt-2">
                    <button onclick="saveParticipante()" class="w-full bg-primary hover:bg-primary-hover text-white p-3 rounded-xl font-bold transition-colors">Salvar Dados</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar / Menu Lateral -->
    <aside id="sidebar" class="bg-white dark:bg-darkcard w-64 h-full border-r border-gray-200 dark:border-darkborder flex flex-col absolute md:relative z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300">
        <div class="p-5 flex items-center justify-between md:justify-start gap-2 border-b border-gray-100 dark:border-darkborder">
            <div class="flex items-center gap-2 text-primary font-bold text-xl">
                <i class="ph-fill ph-users-three text-3xl"></i> SysPessoas
            </div>
            <button class="md:hidden text-gray-500 text-2xl" onclick="toggleSidebar()">
                <i class="ph ph-x"></i>
            </button>
        </div>
        
        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-2">
            <button onclick="navigateTo('dashboard')" id="nav-dashboard" class="nav-btn w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-primary bg-primary/10 font-medium transition-colors">
                <i class="ph ph-squares-four text-xl"></i> Dashboard
            </button>
            <button onclick="navigateTo('participantes')" id="nav-participantes" class="nav-btn w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-darkborder font-medium transition-colors">
                <i class="ph ph-user-list text-xl"></i> Participantes
            </button>
            <button onclick="navigateTo('turmas')" id="nav-turmas" class="nav-btn w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-darkborder font-medium transition-colors">
                <i class="ph ph-books text-xl"></i> Turmas
            </button>
        </nav>
    </aside>

    <!-- Overlay para mobile -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden" onclick="toggleSidebar()"></div>

    <!-- Conteúdo Principal -->
    <main class="flex-1 flex flex-col h-full overflow-hidden w-full relative">
        <header class="bg-white dark:bg-darkcard border-b border-gray-200 dark:border-darkborder h-16 flex items-center px-4 justify-between z-10">
            <div class="flex items-center">
                <button class="md:hidden p-2 mr-2 text-gray-600 dark:text-gray-300 rounded-lg hover:bg-gray-100 dark:hover:bg-darkborder" onclick="toggleSidebar()">
                    <i class="ph ph-list text-2xl"></i>
                </button>
                <h1 id="page-title" class="font-bold text-xl">Dashboard</h1>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-6" id="content-area">
            
            <!-- View: Dashboard -->
            <section id="view-dashboard" class="view-section active">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div class="bg-white dark:bg-darkcard p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-darkborder flex items-center gap-4">
                        <div class="bg-blue-100 dark:bg-blue-900/30 p-3 rounded-xl text-blue-600 dark:text-blue-400">
                            <i class="ph ph-users text-3xl"></i>
                        </div>
                        <div>
                            <h3 class="text-sm text-gray-500 dark:text-gray-400 font-medium">Total de Participantes</h3>
                            <p class="text-3xl font-bold mt-1" id="stat-total">0</p>
                        </div>
                    </div>
                    
                    <div class="bg-white dark:bg-darkcard p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-darkborder flex items-center gap-4">
                        <div class="bg-purple-100 dark:bg-purple-900/30 p-3 rounded-xl text-purple-600 dark:text-purple-400">
                            <i class="ph ph-books text-3xl"></i>
                        </div>
                        <div>
                            <h3 class="text-sm text-gray-500 dark:text-gray-400 font-medium">Total de Turmas</h3>
                            <p class="text-3xl font-bold mt-1" id="stat-turmas">0</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- View: Participantes -->
            <section id="view-participantes" class="view-section">
                <div class="mb-4 flex flex-col xl:flex-row gap-3 justify-between items-start xl:items-center">
                    <div class="relative w-full xl:w-96">
                        <i class="ph ph-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
                        <input type="text" placeholder="Buscar participante..." class="w-full pl-10 pr-4 py-2.5 bg-white dark:bg-darkcard border border-gray-200 dark:border-darkborder rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/50 transition-shadow">
                    </div>
                    
                    <div class="flex flex-wrap gap-2 w-full xl:w-auto">
                        <button onclick="exportarPlanilha()" class="flex-1 xl:flex-none bg-green-600 hover:bg-green-700 text-white px-4 py-2.5 rounded-xl font-semibold flex items-center justify-center gap-2 transition-colors" title="Exportar para Planilha (Excel/CSV)">
                            <i class="ph ph-file-xls text-lg"></i> <span class="hidden sm:inline">Planilha</span>
                        </button>
                        <button onclick="exportarTexto()" class="flex-1 xl:flex-none bg-gray-600 hover:bg-gray-700 text-white px-4 py-2.5 rounded-xl font-semibold flex items-center justify-center gap-2 transition-colors" title="Exportar para Arquivo de Texto">
                            <i class="ph ph-file-text text-lg"></i> <span class="hidden sm:inline">Texto</span>
                        </button>
                        <button onclick="openModalParticipante()" class="flex-1 xl:flex-none bg-primary hover:bg-primary-hover text-white px-5 py-2.5 rounded-xl font-semibold flex items-center justify-center gap-2 transition-colors">
                            <i class="ph ph-plus text-lg"></i> <span class="hidden sm:inline">Novo</span>
                        </button>
                    </div>
                </div>
                
                <div id="lista-participantes" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Preenchido via JS -->
                </div>
            </section>

            <!-- View: Turmas -->
            <section id="view-turmas" class="view-section">
                <div class="bg-white dark:bg-darkcard p-5 rounded-2xl shadow-sm border border-gray-200 dark:border-darkborder mb-6">
                    <h3 class="font-bold text-lg mb-3">Adicionar Nova Turma</h3>
                    <div class="flex flex-col md:flex-row gap-3">
                        <!-- Campo Curso -->
                        <input type="text" id="quick-turma-curso" placeholder="Nome do Curso (ex: Informática)" class="flex-1 p-3 bg-gray-50 dark:bg-[#2a2a2a] border border-gray-200 dark:border-darkborder rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/50">
                        <!-- Campo Ano -->
                        <select id="quick-turma-ano" class="md:w-32 p-3 bg-gray-50 dark:bg-[#2a2a2a] border border-gray-200 dark:border-darkborder rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/50">
                            <option value="1">1º Ano</option>
                            <option value="2">2º Ano</option>
                            <option value="3">3º Ano</option>
                        </select>
                        <button onclick="quickSaveTurma()" class="bg-primary hover:bg-primary-hover text-white px-6 py-3 rounded-xl font-bold transition-colors whitespace-nowrap">
                            Salvar Turma
                        </button>
                    </div>
                </div>
                
                <div id="grid-turmas" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Preenchido via JS -->
                </div>
            </section>
        </div>
    </main>

    <script>
// Importe as funções necessárias dos SDKs que você precisa
import { initializeApp } from "firebase/app" ;   
// TODO: Adicionar SDKs para produtos do Firebase que você deseja usar
// https://firebase.google.com/docs/web/setup#available-libraries

// Configuração do Firebase do seu aplicativo web
const firebaseConfig = { 
  apiKey : "AIzaSyDgWF3wGcnKV0HcRP_zD2ovNq099TD_vd0" , 
  authDomain: "nucleo-8f820.firebaseapp.com",
  ID do projeto : "nucleo-8f820 " 
  bucket de armazenamento : "nucleo-8f820.firebasestorage.app" , 
  messagingSenderId : " 506798510177" 
  appId : "1:506798510177:web:ec2146967281fb8ae6da20" 
};

// Inicializar o Firebase
const app = initializeApp ( firebaseConfig );

        // Estado Global
        let state = { participantes: [], turmas: [] };

        // Função de Inicialização
        async function init() {
            if (!supabaseClient) {
                console.warn("Supabase não configurado. Usando dados fictícios para demonstração.");
                // Dados fictícios (Mocks) para testar a interface
                state.turmas = [
                    { id: 1, nome: 'INFORMÁTICA - 1º ANO' },
                    { id: 2, nome: 'ADMINISTRAÇÃO - 2º ANO' }
                ];
                state.participantes = [
                    { id: 1, nome: 'João Silva', funcao: 'Membro', presencas: 12, turma_id: 1 },
                    { id: 2, nome: 'Maria Souza', funcao: 'Líder', presencas: 45, turma_id: 2 },
                    { id: 3, nome: 'Carlos Oliveira', funcao: 'Visitante', presencas: 2, turma_id: 1 }
                ];
            } else {
                try {
                    const { data: t, error: errT } = await supabaseClient.from('turmas').select('*').order('nome');
                    if (errT) throw errT;
                    if (t) state.turmas = t;

                    const { data: p, error: errP } = await supabaseClient.from('participantes').select('*').order('nome');
                    if (errP) throw errP;
                    if (p) state.participantes = p;
                } catch (error) {
                    console.error("Erro ao carregar dados:", error.message);
                    showToast("Erro ao carregar dados do servidor", true);
                }
            }
            
            render();
        }

        // Sistema de Notificações (Toast)
        let toastTimeout;
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toast-msg');
            const iconEl = document.getElementById('toast-icon');
            
            msgEl.textContent = message;
            
            if (isError) {
                toast.classList.replace('bg-gray-800', 'bg-red-500');
                toast.classList.replace('dark:bg-gray-700', 'bg-red-600');
                iconEl.className = "ph-fill ph-warning-circle text-xl";
            } else {
                toast.classList.replace('bg-red-500', 'bg-gray-800');
                toast.classList.replace('bg-red-600', 'dark:bg-gray-700');
                iconEl.className = "ph-fill ph-check-circle text-xl text-green-400";
            }

            toast.classList.remove('translate-x-full', 'opacity-0');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
            }, 3000);
        }

        // Controle de Modais
        function openModalParticipante(id = null) {
            const modal = document.getElementById('modal-participante');
            const selectTurma = document.getElementById('part-turma');
            
            // Popula o select de turmas
            selectTurma.innerHTML = '<option value="">Sem Turma</option>' + 
                state.turmas.map(t => `<option value="${t.id}">${t.nome}</option>`).join('');

            if (id) {
                // Modo Edição
                document.getElementById('modal-title').textContent = "Editar Participante";
                const p = state.participantes.find(part => part.id === id);
                if (p) {
                    document.getElementById('part-id').value = p.id;
                    document.getElementById('part-nome').value = p.nome;
                    document.getElementById('part-funcao').value = p.funcao || '';
                    document.getElementById('part-presencas').value = p.presencas || 0;
                    document.getElementById('part-turma').value = p.turma_id || '';
                }
            } else {
                // Modo Criação
                document.getElementById('modal-title').textContent = "Novo Participante";
                document.getElementById('part-id').value = '';
                document.getElementById('part-nome').value = '';
                document.getElementById('part-funcao').value = '';
                document.getElementById('part-presencas').value = '';
                document.getElementById('part-turma').value = '';
            }

            modal.classList.remove('hidden');
            // Pequeno delay para a transição de fade funcionar
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-95');
            }, 10);
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300); // Tempo da transição
        }

        // Salvar/Editar Participante
        async function saveParticipante() {
            const id = document.getElementById('part-id').value;
            const nome = document.getElementById('part-nome').value.trim();
            const funcao = document.getElementById('part-funcao').value.trim();
            const presencas = parseInt(document.getElementById('part-presencas').value) || 0;
            const turma_id_str = document.getElementById('part-turma').value;
            const turma_id = turma_id_str ? parseInt(turma_id_str) : null;

            if (!nome) {
                showToast("O nome do participante é obrigatório!", true);
                return;
            }

            const data = { nome, funcao, presencas, turma_id };

            if (!supabaseClient) {
                // Mock (Demonstração)
                if (id) {
                    const idx = state.participantes.findIndex(p => p.id == id);
                    if (idx > -1) state.participantes[idx] = { ...state.participantes[idx], ...data };
                    showToast("Participante atualizado!");
                } else {
                    state.participantes.push({ id: Date.now(), ...data });
                    showToast("Participante criado!");
                }
                closeModal('modal-participante');
                render();
            } else {
                // Supabase Real
                try {
                    if (id) {
                        const { error } = await supabaseClient.from('participantes').update(data).eq('id', id);
                        if (error) throw error;
                        showToast("Participante atualizado!");
                    } else {
                        const { error } = await supabaseClient.from('participantes').insert([data]);
                        if (error) throw error;
                        showToast("Participante criado!");
                    }
                    closeModal('modal-participante');
                    init();
                } catch (error) {
                    showToast("Erro ao salvar: " + error.message, true);
                }
            }
        }

        // Excluir Participante
        async function deleteParticipante(id) {
            if (!supabaseClient) {
                state.participantes = state.participantes.filter(p => p.id !== id);
                showToast("Participante removido com sucesso!");
                render();
            } else {
                try {
                    const { error } = await supabaseClient.from('participantes').delete().eq('id', id);
                    if (error) throw error;
                    showToast("Participante removido com sucesso!");
                    init();
                } catch(error) {
                    showToast("Erro ao remover: " + error.message, true);
                }
            }
        }

        // Excluir Turma
        async function deleteTurma(id) {
            if (!supabaseClient) {
                state.turmas = state.turmas.filter(t => t.id !== id);
                state.participantes.forEach(p => { if (p.turma_id === id) p.turma_id = null; });
                showToast("Turma removida!");
                render();
            } else {
                try {
                    const { error } = await supabaseClient.from('turmas').delete().eq('id', id);
                    if (error) throw error;
                    showToast("Turma removida!");
                    init();
                } catch(error) {
                    showToast("Erro ao remover: " + error.message, true);
                }
            }
        }

        // Salvar Turma Rápido (Curso + Ano)
        async function quickSaveTurma() {
            const inputCurso = document.getElementById('quick-turma-curso');
            const selectAno = document.getElementById('quick-turma-ano');
            
            const curso = inputCurso.value.trim().toUpperCase();
            const ano = selectAno.value;
            
            if(!curso) {
                showToast("Digite o nome do curso!", true);
                return;
            }

            // Junta as informações de forma compatível com o banco de dados
            const nomeFinal = `${curso} - ${ano}º ANO`;

            if (!supabaseClient) {
                // Modo demonstração
                state.turmas.push({ id: Date.now(), nome: nomeFinal });
                inputCurso.value = '';
                selectAno.value = '1';
                showToast("Turma salva com sucesso!");
                render();
                return;
            }

            const { error } = await supabaseClient.from('turmas').insert([{ nome: nomeFinal }]);
            if (error) {
                showToast("Erro ao salvar: " + error.message, true);
            } else { 
                inputCurso.value = ''; 
                selectAno.value = '1';
                showToast("Turma salva com sucesso!");
                init(); // Recarrega os dados reais
            }
        }

        // Exportação de Dados
        function prepararDadosExportacao() {
            return state.participantes.map(p => {
                const turma = state.turmas.find(t => t.id === p.turma_id);
                return {
                    Nome: p.nome,
                    Turma: turma ? turma.nome : 'Sem Turma',
                    Função: p.funcao || 'Sem função',
                    'Vezes no Núcleo': p.presencas || 0
                };
            });
        }

        function exportarPlanilha() {
            if (state.participantes.length === 0) {
                showToast("Nenhum dado para exportar!", true);
                return;
            }
            const data = prepararDadosExportacao();
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Participantes");
            XLSX.writeFile(wb, "participantes_nucleo.xlsx");
            showToast("Planilha exportada com sucesso!");
        }

        function exportarTexto() {
            if (state.participantes.length === 0) {
                showToast("Nenhum dado para exportar!", true);
                return;
            }
            const data = prepararDadosExportacao();
            
            let txtContent = "=== LISTA DE PARTICIPANTES ===\n\n";
            data.forEach((p, index) => {
                txtContent += `[${index + 1}] Nome: ${p.Nome}\n`;
                txtContent += `    Turma: ${p.Turma}\n`;
                txtContent += `    Função: ${p.Função}\n`;
                txtContent += `    Presenças: ${p['Vezes no Núcleo']}\n`;
                txtContent += `-----------------------------------\n`;
            });

            const blob = new Blob([txtContent], { type: "text/plain;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "participantes_nucleo.txt";
            link.click();
            showToast("Arquivo de texto gerado!");
        }

        // Navegação entre abas
        function navigateTo(id) {
            // Oculta todas as sections
            document.querySelectorAll('.view-section').forEach(e => e.classList.remove('active'));
            // Mostra a section alvo
            document.getElementById(`view-${id}`).classList.add('active');
            
            // Atualiza o título da página
            const titulos = {
                'dashboard': 'Dashboard',
                'participantes': 'Gestão de Participantes',
                'turmas': 'Gestão de Turmas'
            };
            document.getElementById('page-title').textContent = titulos[id] || id;

            // Atualiza os estilos do menu lateral
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-primary', 'bg-primary/10');
                btn.classList.add('text-gray-600', 'dark:text-gray-400', 'hover:bg-gray-100', 'dark:hover:bg-darkborder');
            });
            
            const btnAtivo = document.getElementById(`nav-${id}`);
            if (btnAtivo) {
                btnAtivo.classList.remove('text-gray-600', 'dark:text-gray-400', 'hover:bg-gray-100', 'dark:hover:bg-darkborder');
                btnAtivo.classList.add('text-primary', 'bg-primary/10');
            }

            // Fecha sidebar no mobile
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('-translate-x-full');
                document.getElementById('sidebar-overlay').classList.add('hidden');
            }
        }

        // Abrir/Fechar Menu Mobile
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // Renderiza as informações na tela
        function render() {
            // Dashboard
            document.getElementById('stat-total').textContent = state.participantes.length;
            document.getElementById('stat-turmas').textContent = state.turmas.length;

            // Renderizar Turmas
            const containerTurmas = document.getElementById('grid-turmas');
            if (state.turmas.length === 0) {
                containerTurmas.innerHTML = `<div class="col-span-full p-8 text-center text-gray-500 bg-white dark:bg-darkcard rounded-2xl border border-dashed border-gray-300 dark:border-darkborder">Nenhuma turma cadastrada.</div>`;
            } else {
                containerTurmas.innerHTML = state.turmas.map(t => `
                    <div class="bg-white dark:bg-darkcard p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-darkborder flex flex-col gap-3 transition-transform hover:-translate-y-1 hover:shadow-md">
                        <div class="flex items-start justify-between">
                            <div class="p-2.5 bg-blue-50 dark:bg-blue-900/20 text-blue-600 rounded-lg">
                                <i class="ph-fill ph-chalkboard text-xl"></i>
                            </div>
                            <button onclick="deleteTurma(${t.id})" class="text-gray-400 hover:text-red-500 transition-colors" title="Excluir turma"><i class="ph ph-trash text-lg"></i></button>
                        </div>
                        <h4 class="font-bold text-gray-800 dark:text-gray-100 text-lg line-clamp-2">${t.nome}</h4>
                    </div>
                `).join('');
            }

            // Renderizar Participantes
            const containerParticipantes = document.getElementById('lista-participantes');
            if (state.participantes.length === 0) {
                containerParticipantes.innerHTML = `<div class="col-span-full p-8 text-center text-gray-500 bg-white dark:bg-darkcard rounded-2xl border border-dashed border-gray-300 dark:border-darkborder">Nenhum participante cadastrado.</div>`;
            } else {
                containerParticipantes.innerHTML = state.participantes.map(p => {
                    const turmaNome = state.turmas.find(t => t.id === p.turma_id)?.nome || 'Sem Turma';
                    return `
                    <div class="bg-white dark:bg-darkcard p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-darkborder flex items-center gap-4 group">
                        <div class="w-12 h-12 rounded-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center text-gray-500 dark:text-gray-400 font-bold text-lg flex-shrink-0">
                            ${p.nome.charAt(0).toUpperCase()}
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="font-bold text-gray-800 dark:text-gray-100 truncate">${p.nome}</h4>
                            <div class="flex flex-wrap items-center gap-x-2 gap-y-1 mt-1 text-xs sm:text-sm text-gray-500 dark:text-gray-400">
                                <span title="Função" class="flex items-center gap-1"><i class="ph ph-briefcase"></i> ${p.funcao || 'Sem função'}</span>
                                <span class="text-gray-300 dark:text-gray-600 hidden sm:inline">&bull;</span>
                                <span title="Vezes no Núcleo" class="flex items-center gap-1"><i class="ph ph-users-three"></i> ${p.presencas || 0} presenças</span>
                                <span class="text-gray-300 dark:text-gray-600 hidden md:inline">&bull;</span>
                                <span title="Turma" class="flex items-center gap-1 w-full md:w-auto truncate"><i class="ph ph-chalkboard"></i> ${turmaNome}</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-1 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
                            <button onclick="editParticipante(${p.id})" class="w-8 h-8 rounded-full bg-gray-50 dark:bg-[#2a2a2a] flex items-center justify-center text-gray-500 hover:text-primary transition-colors flex-shrink-0" title="Editar">
                                <i class="ph ph-pencil-simple"></i>
                            </button>
                            <button onclick="deleteParticipante(${p.id})" class="w-8 h-8 rounded-full bg-gray-50 dark:bg-[#2a2a2a] flex items-center justify-center text-gray-400 hover:text-red-500 transition-colors flex-shrink-0" title="Excluir">
                                <i class="ph ph-trash"></i>
                            </button>
                        </div>
                    </div>
                    `
                }).join('');
            }
        }

        // Funções Auxiliares chamadas pelo HTML
        function editParticipante(id) {
            openModalParticipante(id);
        }

        // Inicia o app assim que o DOM carregar
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
