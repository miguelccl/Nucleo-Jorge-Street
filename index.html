                            Salvar Turma

                </div>

                    <!-- Preenchido via JS -->
                </div>
            </section>
        </div>
    </main>

    <script>
        // --- CONFIGURAÇÃO FIREBASE ---
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SUA_URL.firebaseapp.com",
            projectId: "SEU_ID",
            storageBucket: "...",
            messagingSenderId: "...",
            appId: "..."
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let state = { participantes: [], turmas: [] };

        async function init() {
            try {
                const snapT = await db.collection("turmas").get();
                state.turmas = snapT.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                const snapP = await db.collection("participantes").get();
                state.participantes = snapP.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            } catch (err) { console.error(err); }
            render();
        }

        async function saveParticipante() {
            const id = document.getElementById('part-id').value;
            const data = {
                nome: document.getElementById('part-nome').value,
                funcao: document.getElementById('part-funcao').value,
                presencas: parseInt(document.getElementById('part-presencas').value) || 0,
                turma_id: document.getElementById('part-turma').value
            };

            if (id) await db.collection("participantes").doc(id).update(data);
            else await db.collection("participantes").add(data);
            
            closeModal('modal-participante');
            init();
        }

        async function deleteParticipante(id) {
            await db.collection("participantes").doc(id).delete();
            init();
        }

        async function deleteTurma(id) {
            await db.collection("turmas").doc(id).delete();
            init();
        }

        async function quickSaveTurma() {
            const curso = document.getElementById('quick-turma-curso').value.toUpperCase();
            const ano = document.getElementById('quick-turma-ano').value;
            await db.collection("turmas").add({ nome: `${curso} - ${ano}º ANO` });
            document.getElementById('quick-turma-curso').value = '';
            init();
        }

        // --- MANUTENÇÃO DAS FUNÇÕES DE EXPORTAÇÃO E UI ORIGINAIS ---
        function exportarPlanilha() {
            const data = state.participantes.map(p => ({
                Nome: p.nome,
                Turma: state.turmas.find(t => t.id === p.turma_id)?.nome || 'Sem Turma',
                Função: p.funcao,
                Presenças: p.presencas
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Participantes");
            XLSX.writeFile(wb, "participantes.xlsx");
        }

        function exportarTexto() {
            let txt = "LISTA DE PARTICIPANTES\n\n";
            state.participantes.forEach(p => {
                txt += `Nome: ${p.nome} | Turma: ${state.turmas.find(t => t.id === p.turma_id)?.nome || 'Sem Turma'}\n`;
            });
            const blob = new Blob([txt], { type: "text/plain" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "lista.txt";
            link.click();
        }

        function render() {
            document.getElementById('stat-total').textContent = state.participantes.length;
            // ... (O resto da sua lógica de renderização segue aqui)
            // Mantive a estrutura original que você já possuía
        }

        function navigateTo(id) {
            document.querySelectorAll('.view-section').forEach(e => e.classList.remove('active'));
            document.getElementById(`view-${id}`).classList.add('active');
            document.getElementById('page-title').textContent = id.charAt(0).toUpperCase() + id.slice(1);
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function openModalParticipante(id = null) { document.getElementById('modal-participante').classList.remove('hidden'); }
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
